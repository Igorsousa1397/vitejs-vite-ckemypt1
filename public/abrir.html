<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encontro com Deus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { text-align: center; max-width: 360px; width: 100%; }
    img { width: 180px; mix-blend-mode: screen; display: block; margin: 0 auto 24px; }
    h1 { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p { color: rgba(255,255,255,.5); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: block; width: 100%; padding: 16px; background: #00c851; color: #000; font-size: 16px; font-weight: 700; border-radius: 14px; text-decoration: none; margin-bottom: 16px; }
    .ios-box { background: rgba(255,159,10,.08); border: 1px solid rgba(255,159,10,.3); border-radius: 14px; padding: 16px; text-align: left; display: none; }
    .ios-titulo { color: #ff9f0a; font-weight: 700; font-size: 13px; margin-bottom: 10px; text-align: center; }
    .ios-texto { color: rgba(255,255,255,.6); font-size: 13px; line-height: 1.6; margin-bottom: 14px; text-align: center; }
    .btn-copiar { display: block; width: 100%; padding: 14px; background: transparent; border: 1px solid rgba(255,159,10,.4); color: #ff9f0a; font-size: 14px; font-weight: 700; border-radius: 12px; cursor: pointer; }
    .copiado { color: #00c851; font-size: 12px; margin-top: 8px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/IMG_2408.PNG" alt="Encontro com Deus" />
    <h1>Encontro com Deus</h1>
    <p>Dias 26, 27 e 28 de Junho</p>

    <a class="btn" id="btnAbrir" href="https://encontrocomdeus-fonte.vercel.app">
      Abrir inscrições
    </a>

    <div class="ios-box" id="iosBox">
      <div class="ios-titulo">📱 Não funcionou?</div>
      <div class="ios-texto">Copie o link abaixo e cole no navegador de sua preferencia para se inscrever:</div>
      <button class="btn-copiar" onclick="copiar()">📋 Copiar link de inscrição</button>
      <div class="copiado" id="copiado">✓ Link copiado! Cole no navegador.</div>
    </div>
  </div>

  <script>
    var ua = navigator.userAgent;
    var isAndroid = /android/i.test(ua);
    var isIOS = /iphone|ipad|ipod/i.test(ua);
    var isInstagram = /Instagram/.test(ua);

    if (isAndroid && isInstagram) {
      setTimeout(function() {
        window.location.href = 'intent://encontrocomdeus-fonte.vercel.app#Intent;scheme=https;package=com.android.chrome;end';
      }, 1500);
    }

    if (isIOS && isInstagram) {
      document.getElementById('iosBox').style.display = 'block';
    }

    function copiar() {
      navigator.clipboard.writeText('https://encontrocomdeus-fonte.vercel.app').then(function() {
        document.getElementById('copiado').style.display = 'block';
        setTimeout(function() {
          document.getElementById('copiado').style.display = 'none';
        }, 3000);
      }).catch(function() {
        var el = document.createElement('textarea');
        el.value = 'https://encontrocomdeus-fonte.vercel.app';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        document.getElementById('copiado').style.display = 'block';
        setTimeout(function() {
          document.getElementById('copiado').style.display = 'none';
        }, 3000);
      });
    }
  </script>
</body>
</html>
