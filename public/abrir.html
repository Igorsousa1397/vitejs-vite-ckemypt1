<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encontro com Deus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    img {
      width: 200px;
      mix-blend-mode: screen;
      display: block;
      margin: 0 auto 32px;
    }
    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    p {
      color: rgba(255,255,255,.5);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #00c851;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .info {
      background: rgba(0,200,81,.08);
      border: 1px solid rgba(0,200,81,.2);
      border-radius: 12px;
      padding: 12px 14px;
      color: rgba(0,200,81,.8);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/IMG_2408.PNG" alt="Encontro com Deus" />
    <h1>Encontro com Deus</h1>
    <p>Dias 26, 27 e 28 de Junho · Itaquaquecetuba</p>
    <a class="btn" href="https://encontrocomdeus-fonte.vercel.app" target="_blank" rel="noopener noreferrer">
      Abrir inscrições
    </a>
    <div class="info">
      📱 Se o link não abrir, copie e cole no seu navegador:<br/>
      <strong>encontrocomdeus-fonte.vercel.app</strong>
    </div>
  </div>
</body>
</html>
