<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encontro com Deus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { text-align: center; max-width: 360px; width: 100%; }
    img { width: 180px; mix-blend-mode: screen; display: block; margin: 0 auto 24px; }
    h1 { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p { color: rgba(255,255,255,.5); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: block; width: 100%; padding: 16px; background: #00c851; color: #000; font-size: 16px; font-weight: 700; border-radius: 14px; text-decoration: none; margin-bottom: 16px; }
    .instrucao { background: rgba(255,159,10,.08); border: 1px solid rgba(255,159,10,.3); border-radius: 14px; padding: 16px; text-align: left; }
    .instrucao-titulo { color: #ff9f0a; font-weight: 700; font-size: 13px; margin-bottom: 10px; }
    .step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; color: rgba(255,255,255,.7); font-size: 13px; line-height: 1.5; }
    .step-num { background: #ff9f0a; color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/IMG_2408.PNG" alt="Encontro com Deus" />
    <h1>Encontro com Deus</h1>
    <p>Dias 26, 27 e 28 de Junho · Itaquaquecetuba</p>
    <a class="btn" href="https://encontrocomdeus-fonte.vercel.app">
      Abrir inscrições
    </a>
    <script>
      var ua = navigator.userAgent;
      var isAndroid = /android/i.test(ua);
      var isInstagram = /Instagram/.test(ua);
      
      if (isAndroid && isInstagram) {
        window.location.href = 'intent://encontrocomdeus-fonte.vercel.app#Intent;scheme=https;package=com.android.chrome;end';
      }
    </script>
    <div class="instrucao">
      <div class="instrucao-titulo">📱 Se não abrir, siga os passos:</div>
      <div class="step"><div class="step-num">1</div><span>Toque nos <strong style="color:#fff">três pontinhos ···</strong> no canto superior direito</span></div>
      <div class="step"><div class="step-num">2</div><span>Selecione <strong style="color:#fff">"Abrir no Safari"</strong> ou <strong style="color:#fff">"Abrir no navegador"</strong></span></div>
      <div class="step"><div class="step-num">3</div><span>Ou copie o link: <strong style="color:#ff9f0a">encontrocomdeus-fonte.vercel.app</strong></span></div>
    </div>
  </div>
</body>
</html>
